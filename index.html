<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <!-- TASK LIST -->
    <div class="border border-primary p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="fw-bold">Task List</h1>

            <button id="btnShowForm" class="btn btn-primary">
                + Add Task
            </button>

        </div>

        <div id="taskList"></div>

    </div>

    <!-- FORM -->
    <div id="taskForm" class="border border-primary p-4 mt-4 d-none">

        <div class="d-flex justify-content-between">

            <h3>Task Form</h3>

            <button id="btnCloseForm" class="btn-close"></button>

        </div>

        <div class="mt-3">

            <label class="form-label">Task</label>

            <input type="text" id="taskName" class="form-control"
                   placeholder="Type your task here...">

            <div id="error" class="text-danger mt-2"></div>

        </div>

        <div class="mt-4">

            <label class="form-label">Priority</label>

            <div>

                <button type="button" class="btn btn-outline-danger priority-btn" data-priority="High">High</button>
                <button type="button" class="btn btn-outline-warning priority-btn" data-priority="Medium">Medium</button>
                <button type="button" class="btn btn-success priority-btn" data-priority="Low">Low</button>

            </div>

        </div>

        <div class="text-end mt-4">

            <button id="btnAdd" class="btn btn-secondary">
                Save
            </button>

        </div>

    </div>

</div>

<script src="./js/app.js"></script>

</body>
</html>
